[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "composite-rules"
version = "0.1.0"
description = "Extract SynPlanner/chython composite rules from PaRoutes-style route trees."
requires-python = ">=3.11"

[project.scripts]
alchems = "alchems.cli:main"
classify-alchemical-rules = "alchems.cli:classify_alchemical_rules"
collect-alchemical-rules = "alchems.cli:extract_alchemical_rules"
extract-composite-rules = "alchems.cli:extract_composite_rules"
score-composite-overlap = "alchems.cli:score_composite_overlap"
unwrap-composite-rule = "alchems.cli:unwrap_composite_rule"
unwrap-alchemical-rule = "alchems.cli:unwrap_alchemical_rule"

[tool.setuptools.packages.find]
where = ["."]
